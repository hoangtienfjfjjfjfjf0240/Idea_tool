<svg width="1600" height="1050" viewBox="0 0 1600 1050" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1050" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F4F7FA"/>
    </linearGradient>
    <linearGradient id="mainWire" x1="800" y1="120" x2="800" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="0.22" stop-color="#2563EB"/>
      <stop offset="0.42" stop-color="#10B981"/>
      <stop offset="0.58" stop-color="#8B5CF6"/>
      <stop offset="0.74" stop-color="#F59E0B"/>
      <stop offset="0.9" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="-14%" y="-20%" width="128%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowMain" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 11 6 L 0 12 Z" fill="#14B8A6"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8.4" refY="5" orient="auto">
      <path d="M 0 0 L 9.5 5 L 0 10 Z" fill="#94A3B8"/>
    </marker>
    <style>
      .title { font: 800 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0F172A; }
      .sub { font: 500 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748B; }
      .axis { font: 900 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: .12em; }
      .label { font: 800 10px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: .08em; }
      .nodeTitle { font: 800 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0F172A; }
      .nodeText { font: 600 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .pill { font: 800 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .wireMain { fill: none; stroke: url(#mainWire); stroke-width: 4.6; stroke-linecap: round; marker-end: url(#arrowMain); }
      .wireSoft { fill: none; stroke: #94A3B8; stroke-width: 2.2; stroke-linecap: round; opacity: .48; marker-end: url(#arrowSoft); }
      .socket { stroke: white; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="url(#bg)"/>
  <rect x="72" y="30" width="1456" height="982" rx="8" fill="white" stroke="#E2E8F0"/>

  <text x="120" y="78" class="title">Strategy Map dọc theo trục Y</text>
  <text x="120" y="108" class="sub">Level không nằm ngang nữa. Core User, PSP, Emotion, Visual, Painpoint, Angle, Gen xếp từ trên xuống.</text>

  <rect x="1186" y="58" width="112" height="36" rx="8" fill="#EEF2FF" stroke="#C7D2FE"/>
